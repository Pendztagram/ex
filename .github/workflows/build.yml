name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: "build"
  cancel-in-progress: true

permissions:
  contents: write

on:
  push:
    branches:
      # choose your default branch
      - main
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          path: "src"

      - name: Setup JDK 21
        uses: actions/setup-java@v4.6.0
        with:
          distribution: "adopt"
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Access Secrets
        env:
          BSTATION_COOKIE: ${{ secrets.BSTATION_COOKIE }}
          DRAKORID_COOKIE: ${{ secrets.DRAKORID_COOKIE }}
          CRUNCHYROLL_BASIC_TOKEN: ${{ secrets.CRUNCHYROLL_BASIC_TOKEN }}
          CRUNCHYROLL_REFRESH_TOKEN: ${{ secrets.CRUNCHYROLL_REFRESH_TOKEN }}
          ANICHI_API: ${{ secrets.ANICHI_API }}
          ANICHI_SERVER: ${{ secrets.ANICHI_SERVER }}
          ANICHI_ENDPOINT: ${{ secrets.ANICHI_ENDPOINT }}
          ANICHI_APP: ${{ secrets.ANICHI_APP }}
          ZSHOW_API: ${{ secrets.ZSHOW_API }}
          SFMOVIES_API: ${{ secrets.SFMOVIES_API }}
          CINEMATV_API: ${{ secrets.CINEMATV_API }}
          GHOSTX_API: ${{ secrets.GHOSTX_API }}
          SUPERSTREAM_FIRST_API: ${{ secrets.SUPERSTREAM_FIRST_API }}
          SUPERSTREAM_SECOND_API: ${{ secrets.SUPERSTREAM_SECOND_API }}
          SUPERSTREAM_THIRD_API: ${{ secrets.SUPERSTREAM_THIRD_API }}
          SUPERSTREAM_FOURTH_API: ${{ secrets.SUPERSTREAM_FOURTH_API }}
        run: |
          cd $GITHUB_WORKSPACE/src
          if [ -n "$BSTATION_COOKIE" ]; then
            if [ -d "BstationProvider" ]; then
              printf '%s' "$BSTATION_COOKIE" > BstationProvider/.bstation.cookies
            else
              echo "Warning: BstationProvider directory not found, skipping BSTATION_COOKIE"
            fi
          fi
          if [ -n "$DRAKORID_COOKIE" ]; then
            if [ -d "DrakoridProvider" ]; then
              printf '%s' "$DRAKORID_COOKIE" > DrakoridProvider/.drakorid.cookies
            else
              echo "Warning: DrakoridProvider directory not found, skipping DRAKORID_COOKIE"
            fi
          fi
          echo TMDB_API=${{ secrets.TMDB_API }} >> local.properties
          echo DUMP_API=${{ secrets.DUMP_API }} >> local.properties
          echo DUMP_KEY=${{ secrets.DUMP_KEY }} >> local.properties
          echo FanCode_API=${{ secrets.FanCode_API }} >> local.properties
          echo FlixHQAPI=${{ secrets.FlixHQAPI }} >> local.properties
          echo CRUNCHYROLL_BASIC_TOKEN=$CRUNCHYROLL_BASIC_TOKEN >> local.properties
          echo CRUNCHYROLL_REFRESH_TOKEN=$CRUNCHYROLL_REFRESH_TOKEN >> local.properties
          echo ANICHI_API=$ANICHI_API >> local.properties
          echo ANICHI_SERVER=$ANICHI_SERVER >> local.properties
          echo ANICHI_ENDPOINT=$ANICHI_ENDPOINT >> local.properties
          echo ANICHI_APP=$ANICHI_APP >> local.properties
          echo ZSHOW_API=$ZSHOW_API >> local.properties
          echo SFMOVIES_API=$SFMOVIES_API >> local.properties
          echo CINEMATV_API=$CINEMATV_API >> local.properties
          echo GHOSTX_API=$GHOSTX_API >> local.properties
          echo SUPERSTREAM_FIRST_API=$SUPERSTREAM_FIRST_API >> local.properties
          echo SUPERSTREAM_SECOND_API=$SUPERSTREAM_SECOND_API >> local.properties
          echo SUPERSTREAM_THIRD_API=$SUPERSTREAM_THIRD_API >> local.properties
          echo SUPERSTREAM_FOURTH_API=$SUPERSTREAM_FOURTH_API >> local.properties

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find . -type f -path "*/build/*.cs3" -exec cp -f {} $GITHUB_WORKSPACE/artifacts \;
          cp -f build/plugins.json $GITHUB_WORKSPACE/artifacts/plugins.json

      - name: Push builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/builds-branch
          cd $GITHUB_WORKSPACE/builds-branch

          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin builds || true

          if git show-ref --verify --quiet refs/remotes/origin/builds; then
            git checkout -B builds origin/builds
          else
            git checkout --orphan builds
          fi

          # Clean branch working tree, then add fresh artifacts
          git rm -r --ignore-unmatch .
          cp -f $GITHUB_WORKSPACE/artifacts/*.cs3 .
          cp -f $GITHUB_WORKSPACE/artifacts/plugins.json ./plugins.json
          git add .

          git commit -m "Build $GITHUB_SHA" || exit 0   # do not error if nothing to commit
          git push --force origin builds
